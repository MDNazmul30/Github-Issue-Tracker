<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-[#F6F8FA]">

    <!-- Navbar -->
    <nav class="bg-white border-b">

        <div class="w-[90%] mx-auto flex justify-between items-center py-4">

            <div class="flex items-center gap-3">
                <img class="w-8" src="./assets/github-logo.png">
                <h1 class="font-bold text-xl">GitHub Issues Tracker</h1>
            </div>

            <div>
                <input id="searchInput" class="input input-bordered w-64" placeholder="Search issues...">
                <button id="searchBtn" class="btn btn-primary">Search</button>
            </div>

        </div>

    </nav>


    <!-- Main Container -->
    <section class="w-[90%] mx-auto mt-8">

        <!-- Tabs -->
        <div class="flex gap-3 mb-6">

            <button onclick="toggleStyle('all')" id="allBtn" class="btn btn-primary">
                All
            </button>

            <button onclick="toggleStyle('open')" id="openBtn" class="btn btn-outline">
                Open
            </button>

            <button onclick="toggleStyle('closed')" id="closeBtn" class="btn btn-outline">
                Closed
            </button>

        </div>


        <!-- Issue Summary -->
        <div class="bg-white rounded-lg shadow p-5 flex justify-between items-center">

            <div class="flex items-center gap-4">

                <img class="w-10" src="./assets/Aperture.png">

                <div>
                    <h2 id="issueCount" class="text-lg font-bold">0 Issues</h2>
                    <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                </div>

            </div>

            <div class="flex gap-4 text-sm">

                <div class="flex items-center gap-1">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    Open
                </div>

                <div class="flex items-center gap-1">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    Closed
                </div>

            </div>

        </div>


        <!-- Loader -->
 <!-- Make your spinner bigger and add text -->
<div id="loader" class="hidden flex flex-col items-center justify-center py-10">
    <span class="loading loading-spinner loading-lg text-primary"></span>
    <p class="mt-4 text-lg font-semibold text-gray-600">Loading issues...</p>
    <p class="text-sm text-gray-400">Please wait</p>
</div>


        <!-- Issue Grid -->
        <div id="issueContainer" class="grid lg:grid-cols-4 md:grid-cols-2 gap-6 mt-8"></div>

    </section>



    <!-- Modal -->
    <dialog id="issueModal" class="modal">

        <div class="modal-box">

            <h2 class="text-xl font-bold mb-2" id="modalTitle"></h2>

            <div class="flex gap-2 text-sm mb-2">
                <span id="modalStatus" class="badge"></span>
                <span id="modalAuthor"></span>
                <span id="modalDate"></span>
            </div>

            <div class="flex gap-2 mb-3" id="modalLabelsContainer"></div>

            <p id="modalDesc" class="mb-4"></p>

            <div class="flex gap-20">

                <div>
                    <p class="text-sm text-gray-500">Assignee</p>
                    <p id="modalassign"></p>
                </div>

                <div>
                    <p class="text-sm text-gray-500">Priority</p>
                    <span id="modalPriority" class="badge badge-warning"></span>
                </div>

            </div>

            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>

        </div>

    </dialog>


    <script src="./script/main.js"></script>

</body>

</html>
